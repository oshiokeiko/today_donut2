<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🍩 今日のおすすめドーナツ占い</title>

  <!------------------------------------
  Tailwind CSS CDN を設定 
  -------------------------------------->
    <script src="https://cdn.tailwindcss.com"></script>

  <!------------------------------------
  Google Fonts: Noto Sans JP を読み込み
  -------------------------------------->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap"
      rel="stylesheet"
    />

  <!------------------------------------
  外部CSSファイルの読み込み
  -------------------------------------->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="h-screen flex justify-center items-center" style="background-image: url('images/pattan.png'); background-repeat: repeat; background-size: 700px;">
    
    <!------------------------------------
    幅375px固定＿PCでも中央寄せ
    -------------------------------------->
    <div class="w-[430px] h-screen mx-auto px-5 bg-orange-100 overflow-y-auto">
      <!-- タイトル -->
      <h1 class="text-center mt-8 mb-1">
        <img src="images/logo.png" alt="今日のおすすめドーナツ占い" class="mx-auto" />
      </h1>
      <p class="text-center text-gray-500 text-sm mb-8">
        今日の調子はどう？<br>
        気分を選んで、運命のドーナッツを見つけよう！
      </p>

      <!------------------------------------
      気分を選択するボタン
      -------------------------------------->
      <div class="flex flex-col gap-3 mb-8">
        <button
          id="btn-great"
          class="w-full rounded-full py-4 font-bold text-gray-600 text-lg bg-gray-50 hover:bg-gray-100 active:scale-95 transition-all shadow-xs"
        >
          絶好調 😆
        </button>
        <button
          id="btn-normal"
          class="w-full rounded-full py-4 font-bold text-gray-600 text-lg bg-gray-50 hover:bg-gray-100 active:scale-95 transition-all shadow-xs"
        >
          ふつう 😐
        </button>
        <button
          id="btn-tired"
          class="w-full rounded-full py-4 font-bold text-gray-600 text-lg bg-gray-50 hover:bg-gray-100 active:scale-95 transition-all shadow-xs"
        >
          ちょっとつかれた 😔
        </button>
      </div>

      <!------------------------------------
      モーダル（画面全体を覆う幕 ＋ 結果カード）
      -------------------------------------->
      <div
        id="modal-overlay"
        class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
      >
        <!-- 結果カード（真ん中に浮かぶ） -->
        <div id="result" class="rounded-2xl p-5 shadow-md bg-white w-[340px]">
          <!-- ドーナツイラスト -->
          <img
            id="donut-img"
            src=""
            alt=""
            class="w-48 h-48 mx-auto object-contain rounded-xl mb-4"
          />

          <!-- ドーナツ名 -->
          <p
            id="donut-name"
            class="text-xl font-black text-center text-red-600 mb-2"
          ></p>

          <!-- 一言コメント -->
          <p
            id="donut-comment"
            class="text-sm text-gray-600 text-center leading-relaxed mb-4"
          ></p>

          <!-- ラッキーアイテム & ラッキーカラー -->
          <div class="flex gap-2 mb-4">
            <div class="flex-1 text-center bg-orange-50 rounded-xl py-2 px-2">
              <p class="text-xs text-gray-500 mb-1">ラッキーアイテム</p>
              <p id="lucky-item" class="text-sm font-bold text-gray-600"></p>
            </div>
            <div class="flex-1 text-center bg-orange-50 rounded-xl py-2 px-2">
              <p class="text-xs text-gray-500 mb-1">ラッキーカラー</p>
              <p id="lucky-color" class="text-sm font-bold text-gray-600"></p>
            </div>
          </div>

          <!-- もう一度占うボタン -->
          <button
            id="reset-btn"
            class="w-full rounded-full py-3 font-bold text-white text-base bg-yellow-600 hover:bg-red-600 active:scale-95 transition-all shadow"
          >
            もう一度占う
          </button>
        </div>
      </div>
    </div>

    <!------------------------------------
    ここからJS記述
    -------------------------------------->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

    <script>
      // ===================================================
      // ドーナッツの候補をdonutsに入れる
      // 最後の1個がレアドーナツ（RARE_CHANCEで確率を設定）
      // ===================================================
      const donuts = [
        { name: "シュガーリング",       img: "images/sugar_ring.png",        message: "その輪のように、今日はつながりが広がる予感。誰かに声をかけてみて。" },
        { name: "ミルキークラウド",     img: "images/milky_cloud.png",       message: "ふわっとした出会いが、思いのほか深くなる一日。柔らかく受け取って。" },
        { name: "ストロベリーベール",   img: "images/strawberry_veil.png",   message: "甘さの中にある酸味が今日のスパイス。小さなすれ違いも、あとから笑い話に。" },
        { name: "マットチョコリング",   img: "images/matte_choco_ring.png",  message: "落ち着いた深みが今日の武器。焦らず、じっくり向き合うと道が開ける。" },
        { name: "レモンシャワー",       img: "images/lemon_shower.png",      message: "さっぱりとした風が吹く日。抱えていたモヤモヤを、今日手放していい。" },
        { name: "シナモンツイスト",     img: "images/cinnamon_twist.png",    message: "ひとひねりのアイデアが光る。いつもと違うルートを選んでみて。" },
        { name: "ブルーベリーフロスト", img: "images/blueberry_frost.png",   message: "静かな確信が宿る日。自分の直感を、今日だけは信じ切ってみて。" },
        { name: "キャラメルクリスプ",   img: "images/caramel_crisp.png",     message: "表面はサクッと、中はとろける。今日の頑張りは、後からじんわり報われる。" },
        { name: "マカダミアホワイト",   img: "images/macadamia_white.png",   message: "リッチな一日の予感。自分に少し贅沢を許すと、気持ちが上向く。" },
        { name: "アールグレイグレーズ", img: "images/earl_grey_glaze.png",   message: "香りを楽しむように、今日は過程を味わって。急がなくていい。" },
        { name: "ゴールデン・ナッツ・レガリア", img: "images/golden_nuts_regalia.png", message: "これが出た日は、特別な何かが動き始めるサイン。直感を大切に、チャンスの扉を叩いて。あなたの今日は、輝いている。" },
      ];

      // ===================================================
      // レアドーナッツが出る確率を出すために
      // RARE_CHANCEに5を代入
      // ===================================================
      const RARE_CHANCE = 5; // 5%

      // ===================================================
      // ドーナッツをピックアップする関数
      // ===================================================
      function pickDonut() {
        // 0〜100のランダムな数字が RARE_CHANCE（5）より小さければ
        if (Math.random() * 100 < RARE_CHANCE) {
          // レアドーナッツを表示する。
          // 配列の番号は0から始まるので、最後のレアドーナツを表示するは donuts.length - 1
          return donuts[donuts.length - 1]; 
        }else{
          // 5より大きければ、ランダムな数字を正数にしてレアドーナツ以外を表示する
          // （donuts.length - 1）配列から1ひいてランダム数字を出し正数にすると、配列最後のレアドーナツは含まれない
          return donuts[Math.floor(Math.random() * (donuts.length - 1))]
        }
      }
      // ===================================================
      // ラッキーアイテムの候補をluckyItemsに入れる
      // ===================================================
      const luckyItems = [
        "いちご", "コーヒー", "ノート", "ハンカチ", "傘",
        "鏡", "カメラ", "財布", "鍵", "花",
        "本", "クッション", "リボン", "メガネ", "スニーカー"
      ];

      // ===================================================
      // ラッキーカラーの候補をluckyColorsに入れる
      // ===================================================
      const luckyColors = [
        "ピンク", "オレンジ", "イエロー", "グリーン", "ブルー",
        "パープル", "ホワイト", "レッド", "ゴールド", "シルバー",
        "ラベンダー", "ミント", "コーラル", "ネイビー", "ベージュ"
      ];

      // ===================================================
      // ラッキーアイテム・カラーをランダムで表示する
      // ===================================================
      function showLucky() {
        const item = luckyItems[Math.floor(Math.random() * luckyItems.length)];
        const color = luckyColors[Math.floor(Math.random() * luckyColors.length)];
        $("#lucky-item").text(item);
        $("#lucky-color").text(color);
      }
      
      // ===================================================
      // 気分ボタン（絶好調・ふつう・疲れた）を押したら
      // pickDonut()でドーナッツを選んで結果を表示する
      // ===================================================
      $("#btn-great, #btn-normal, #btn-tired").on("click", function () {
        const today_donut = pickDonut();
        $("#donut-img").attr("src", today_donut.img);
        $("#donut-name").text(today_donut.name);
        $("#donut-comment").text(today_donut.message);
        $("#modal-overlay").removeClass("hidden").hide().fadeIn(400);
        showLucky();

        if(today_donut === donuts[donuts.length-1]){
          confetti();
        }
      });

      // ===================================================
      // もう一度占うボタンを押したら、モーダルを非表示にする
      // ===================================================
      $("#reset-btn").on("click", function () {
        $("#modal-overlay").fadeOut(300);
      });
    </script>
  </body>
</html>
